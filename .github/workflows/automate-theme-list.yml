name: Update Theme List Hashes

on:
  push:
    branches:
      - gh-pages
    paths:
      - "assets/themes/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-hashes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@eef61427674919ca1764666ca010ae2b12c75a4d # v4.2.1
        with:
          ref: gh-pages

      - name: Set up Node.js
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # v4.0.4
        with:
          node-version: "24"

      - name: Get generation script from master
        run: |
          mkdir -p scripts
          curl -s https://raw.githubusercontent.com/NERDHEAD-lab/POE2-unofficial-launcher/master/scripts/generate-theme-hashes.js -o scripts/generate-theme-hashes.js

      - name: Generate hashes
        run: node scripts/generate-theme-hashes.js

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add themes.json
          git commit -m "chore: update theme asset hashes [skip ci]" || echo "No changes to commit"
          git push origin gh-pages
